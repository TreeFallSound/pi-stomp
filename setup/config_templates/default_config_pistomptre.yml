# This file provides some default configuration for the system
# Most of this configuration can be overriden by pedalboard specific configuration.  To accomplish that, add
# a file, named config.yml to the pedalboard directory (ie. ~/data/.pedalboards/<pedalboard-name>)
#
# WARNING
# Changes made to this file can cause software errors or hardware failures
# Change only the elements required for the modified behavior desired

---
hardware:
  # Hardware version (1.0 for original pi-Stomp, 2.0 for pi-Stomp Core, 3.0 for Tre)
  version: 3.0

  # midi:
  # channel: <integer>            The midi channel used for midi messages (required)
  #                               can be changed to value 0 thru 15 to avoid conflicts with other hardware
  midi:
   channel: 14

  # footswitches:
  # Each footswitch definition is a list which starts with the id
  # id: <integer>                 The footswitch id number (required)
  # adc_input: <integer>          The analog input to which the switch is connected (required)
  # ledstrip_position: <integer>  The position of the corresponding LED (optional)
  # midi_CC: <integer>            The MIDI CC message to be sent when switch is clicked (optional)
  # midi_port: <port_name>        Send MIDI to this external port INSTEAD of the virtual MIDI Through port (optional)
  #                               Falls back to the virtual port only if the device is unavailable; must be the device name (e.g. 'Source Audio C4 Synth')
  # midi_channel: <integer>       Override MIDI channel for this encoder (0-15, optional)
  #                               Use when the external device is on a different channel than the hardware default
  # longpress: <callback_name>    The name of a handler method to call when switch is long-pressed (optional)
  #                               longpress can be a list enclosed with []'s
  #
  footswitches:
  - id: 0
    adc_input: 0
    ledstrip_position: 0
    midi_CC: 60
    longpress: previous_snapshot
  - id: 1
    adc_input: 1
    ledstrip_position: 1
    midi_CC: 61
    longpress: next_snapshot
  - id: 2
    adc_input: 2
    ledstrip_position: 2
    midi_CC: 62
    longpress: toggle_tuner_enable
  - id: 3
    adc_input: 3
    ledstrip_position: 3
    midi_CC: 63
    longpress: toggle_tap_tempo_enable
    tap_tempo: set_mod_tap_tempo

  # analog_controllers:
  # Each control definition is a list which starts with the adc_input
  # adc_input: <integer>          The analog input to which the control is connected (required)
  # id: <integer>                 The id and position on the screen (starting with 0 on the left)
  # type: <KNOB | EXPRESSION>     The control type, used to represent the control on the screen (optional)
  # midi_CC: <integer>            The MIDI CC message to be sent when the control is adjusted (optional)
  # midi_port: <port_name>        Send MIDI to this external port INSTEAD of the virtual MIDI Through port (optional)
  #                               Falls back to the virtual port only if the device is unavailable; must be the device name (e.g. 'Source Audio C4 Synth')
  # autosync: <true | false>      Whether to send current value on pedalboard load (optional, default: false)
  #
  #analog_controllers:
  #  - adc_input: 5
  #    id: 0
  #    type: EXPRESSION
  #    midi_CC: 75
  #    autosync: true

  # encoders:
  # Each encoder definition is a list which starts with the id
  # id: <integer>                 The encoder id and position on the screen (required)
  # type: <KNOB | VOLUME>         The control type (default is KNOB, VOLUME controls output volume)
  # midi_CC: <integer>            The MIDI CC message to be sent when the control is adjusted (optional)
  #                               cannot be used along with type=VOLUME
  # midi_port: <port_name>        Send MIDI to this external port INSTEAD of the virtual MIDI Through port (optional)
  #                               Falls back to the virtual port only if the device is unavailable; must be the device name (e.g. 'Source Audio C4 Synth')
  # midi_channel: <integer>       Override MIDI channel for this encoder (0-15, optional)
  #                               Use when the external device is on a different channel than the hardware default
  # longpress: <callback_name>    The name of a handler method to call when switch is long-pressed (optional)
  #
  encoders:
    - id: 1
      midi_CC: 70
      longpress: previous_snapshot
    - id: 2
      midi_CC: 71
      longpress: next_snapshot
    - id: 3
      type: VOLUME

  # external_midi:
  # External MIDI device synchronization - sends messages when pedalboards load
  # Can be overridden per-pedalboard by creating <pedalboard>.pedalboard/config.yml
  #
  # enabled: <boolean>              Enable/disable external MIDI (default: false)
  # send_delay_ms: <integer>        Delay between consecutive messages in milliseconds (default: 10)
  #
  # messages:                       MIDI messages to send on pedalboard load
  #   <device_name>:                Exact ALSA client name of the device (run `aconnect -l` to find it)
  #     - [0xSS, 0xDD, ...]         List of MIDI messages (hex bytes)
  #
  # Example configuration:
  #
  # external_midi:
  #   enabled: true
  #   send_delay_ms: 10
  #   messages:
  #     Source Audio C4 Synth:
  #       - [0xB0, 0x66, 0x00]      # CC 102 = 0 (bypass)
  #     HX Stomp:
  #       - [0xC0, 0x00]            # Program Change 0
  #
  # MIDI message formats:
  #   Program Change: [0xCn, program]        where n = channel (0-F)
  #   Control Change: [0xBn, cc, value]      where n = channel (0-F)
  #
  # Per-pedalboard override example (<pedalboard>.pedalboard/config.yml):
  #   hardware:
  #     external_midi:
  #       messages:
  #         Source Audio C4 Synth:
  #           - [0xC0, 0x05]        # Program Change 5 for this pedalboard only


# Blend Mode Configuration (Pedalboard-specific)
# This feature interpolates between snapshots based on analog input position.
# IMPORTANT: This should be configured per-pedalboard in <pedalboard>.pedalboard/config.yml
# Requires an expression pedal or encoder to be configured in analog_controllers above.
#
# Blend Mode: Smoothly interpolate between snapshots using analog input
# Supports expression pedals and tweak encoders (Tweak1=ID 1, Tweak2=ID 2)
#
# blend_snapshots:
#   - name: "Clean to Fuzz"           # Required: Snapshot name (created automatically)
#     input_id: 0                     # Required: Expression pedal (0) or encoder (1, 2)
#     interpolation: smooth           # Optional easing (default: linear)
#                                     # One of: linear, smooth, build, drop, snap, bloom
#     stops:                          # Dict format: position -> snapshot name/index
#       "0.0": "Clean"                # Snapshot by name (case-insensitive prefix match)
#       "0.5": "Crunch"               # Or by index (0-based integer)
#       "1.0": "Fuzz"                 # Min separation: 1/127 (0.0079)
#   - name: "Volume Swell"
#     input_id: 1                     # Tweak1 encoder
#     stops: ["Quiet", "Loud"]        # List format: auto-spaced evenly [0.0, 1.0]
#
# Features:
# - MIDI-bound parameters automatically excluded from interpolation (prevents conflicts)
# - Pre-computed diff maps for optimized 10ms critical path
# - MIDI-level de-duplication prevents redundant WebSocket traffic
